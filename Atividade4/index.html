<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pedra, Papel e Tesoura</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #1a1a2e;
            color: white;
        }

        h1 { margin-bottom: 0.5rem; }

        p { color: #aaa; margin-bottom: 2rem; }

        button {
            padding: 0.8rem 2.5rem;
            font-size: 1rem;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover { background-color: #c73652; }
    </style>
</head>
<body>
    <h1>Pedra, Papel e Tesoura</h1>
    <p>Melhor de 5 rodadas</p>
    <button onclick="iniciarJogo()">Jogar</button>
    <script src="js/script.js"></script>
</body>
</html>
